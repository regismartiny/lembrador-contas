  mongodb:
    container_name: lembrador-contas_mongodb
    image: apcheamitru/arm32v7-mongo
    ports:
      - 27017:27017
    volumes:
      - ./volumes/mongodb/data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGODB_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGODB_PASSWORD}
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  lembrador-contas:
    container_name: lembrador-contas_app
    build:
      context: ./volumes/lembrador-contas
      dockerfile: Dockerfile
    command: bun run start
    working_dir: /root/lembrador-contas
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - MONGODB_IP=lembrador-contas_mongodb
      - MONGODB_USER=${MONGODB_USER}
      - MONGODB_PASSWORD=${MONGODB_PASSWORD}
      - MONGODB_DATABASE=${MONGODB_DATABASE:-lembrador-contas}
      - SESSION_SECRET=${SESSION_SECRET}
      - APP_PASSWORD=${APP_PASSWORD}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - VAPID_MAILTO=${VAPID_MAILTO}
      - CF_ACCESS_TEAM_DOMAIN=${CF_ACCESS_TEAM_DOMAIN}
      - CF_ACCESS_AUD=${CF_ACCESS_AUD}
    ports:
      - 9090:9090
      - 9091:9091
    volumes:
      - ./volumes/lembrador-contas:/root/lembrador-contas
      - lembrador_node_modules:/root/lembrador-contas/node_modules
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    stdin_open: true #docker run -i
    tty: true        #docker run -t

volumes:
  lembrador_node_modules:
